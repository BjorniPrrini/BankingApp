<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bank – Login</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="css/loginpagestyles.css"/>
</head>

<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">GS</span>
            <div>
                <span class="logo-name">GoldStone Bank</span>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="login-card">
            <div class="alert" id="alert-box"></div>
        
            <h2 class="form-title">Sign In</h2>
        
            <p class="form-subtitle">Choose your role and enter your credentials</p>

            <div class="role-selector">
                <button class="role-btn active" data-role="client">
                    <span>👤</span> Client
                </button>
                <button class="role-btn" data-role="banker">
                    <span>🏦</span> Banker
                </button>
                <button class="role-btn" data-role="admin">
                    <span>⚙️</span> Admin
                </button>
            </div>

            <form id="login-form">
                <div class="field-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@email.com" />
                </div>

                <div class="field-group" id="empid-group" style="display: none;">
                    <label for="empid">Employee ID</label>
                    <input type="text" id="empid" placeholder="123..."/>
                    <small>Required for Banker and Admin roles only</small>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" />
                        <button type="button" class="eye-btn">👁</button>
                    </div>
                </div>
            
                <div class="form-options">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            </form>
        </section>
    </main>

    <div class="modal-overlay" id="forgot-modal">
        <div class="modal">
            <button class="modal-close">✕</button>
        
            <h2>Reset Password</h2>

            <p class="modal-subtitle">We'll send a reset link to your email address</p>

            <form>
                <div class="field-group">
                    <label for="forgot-email">Registered Email</label>
                    <input type="email" id="forgot-email" placeholder="your@email.com"/>
                </div>
            
                <button type="submit" class="login-btn">Send Reset Link</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Bank  · All rights reserved</p>
    </footer>

    <script src="js/loginscript.js"></script>

</body>
</html>
