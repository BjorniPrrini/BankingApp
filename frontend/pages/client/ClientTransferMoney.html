<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer Money — GoldStone Bank</title>
    <link rel="stylesheet" href="../../css/client/clientHome.css" />
</head>
<body>

<header class="header">
    <div class="logo">
        <div class="logo-icon">GS</div>
        <span class="logo-name">GoldStone Bank</span>
    </div>
    <span class="admin-badge">Client Portal</span>
</header>

<main class="main">

    <div class="transfer-card">
        <div class="transfer-card-header">
            <div class="section-title">Transfer Money</div>
            <div class="section-sub">Fill in the details below to send funds</div>
        </div>

        <div class="transfer-fields">

            <div class="field-group">
                <label>Recipient ID</label>
                <input type="text" id="recipientIdField" placeholder="" />
            </div>

            <div class="field-group">
                <label>Amount (ALL)</label>
                <input type="number" id="transferAmountField" placeholder="0.00" min="0.01" step="0.01" />
            </div>

            <button class="btn-confirm-transfer">Transfer</button>

        </div>
    </div>

    <div class="btn-row">
        <button class="btn-home" onclick="window.location.href='client.html'">Homepage</button>
    </div>

</main>

<footer class="footer">
    <p>GoldStone Bank 2026</p>
</footer>

</body>
</html>
