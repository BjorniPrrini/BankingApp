<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banker Panel</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="/css/banker/bankerHome.css">
</head>
<body>

<header class="header">
    <div class="logo">
        <div class="logo-icon">GS</div>
        <span class="logo-name">GoldStone Bank</span>
    </div>
    <span class="admin-badge">Banker Panel</span>
</header>

<main class="main">
    <div class="section-header">
        <div>
            <div class="section-title">Client</div>
        </div>
        <div class="section-actions">
            <button class="add-btn">+ Add Client</button>
            <button class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Balance</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr>

            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer class="footer">GoldStone Bank 2026</footer>

<script src="/js/banker/bankerHome.js"></script>

</body>
</html>
