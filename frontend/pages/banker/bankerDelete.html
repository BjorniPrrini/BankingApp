<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Client</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="/css/banker/bankerHome.css">
</head>
<body>
<header class="header">
    <div class="logo">
        <div class="logo-icon">GS</div>
        <span class="logo-name">GoldStone Bank</span>
    </div>
    <span class="admin-badge">Banker Panel</span>
</header>
<main class="main">
    <div class="login-card">
        <h2 class="form-title">Delete Client</h2>
        <p class="form-subtitle">Are you sure you want to delete this client?</p>
        <div class="field-group">
            <label>ID</label>
            <input type="text" id="cliID" readonly />
        </div>
        <div class="field-group">
            <label>Full Name</label>
            <input type="text" id="cliName" readonly />
        </div>
        <div class="field-group">
            <label>Balance</label>
            <input type="text" id="cliBalance" readonly />
        </div>
        <div class="field-group">
            <label>Email</label>
            <input type="text" id="cliEmail" readonly />
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="action-delete" id="confirmDelete">Delete</button>
            <button class="back-btn" id="cancelDelete">Cancel</button>
        </div>
    </div>
</main>
<footer class="footer">GoldStone Bank 2026</footer>

<script src="/js/banker/bankerDelete.js"></script>

</body>
</html>
