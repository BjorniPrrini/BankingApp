<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bank – Add client</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <link rel="stylesheet" href="../../css/banker/bankerAdd.css"/>
</head>

<body>
<header class="header">
  <div class="logo">
    <span class="logo-icon">GS</span>
    <div>
      <span class="logo-name">GoldStone Bank</span>
    </div>
  </div>

  <span class="banker-badge">Banker Panel</span>
</header>

<main class="main">
  <section class="login-card">
    <div class="alert" id="alert-box"></div>

    <h2 class="form-title">Add client</h2>

    <p class="form-subtitle">Fill client credentials</p>

    <form id="login-form">
      <div class="field-group">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Name" />
      </div>

      <div class="field-group">
        <label for="surname">Surname:</label>
        <input type="text" id="surname" placeholder="Surname" />
      </div>

      <div class="field-group">
        <label for="balance">Balance:</label>
        <input type="number" id="balance" placeholder="0,000$" />
      </div>

      <div class="field-group">
        <label for="generatedID">ID:</label>
        <input type="text" id="generatedID" placeholder="Generated ID" readonly/>
      </div>

      <div class="field-group">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="namesurnameID@gmail.com"/>
      </div>

      <div class="field-group">
        <label for="generatedPassword">Password:</label>
        <input type="text" id="generatedPassword" placeholder="Password" readonly/>
      </div>

      <button type="submit" class="add-btn" id="addButton">Add</button>
      <button type="button" class="goBack" id="goBack">Go Back</button>
    </form>
  </section>
</main>
<footer class="footer">GoldStone Bank 2026</footer>

<script src="/js/banker/bankerAdd.js"></script>

</body>
</html>
